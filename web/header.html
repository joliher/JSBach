<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <title>Header Router JSBach</title>
  <link rel="stylesheet" href="css/header.css">
</head>

<body>
  <div class="header-container">
    <div class="brand">
      <a href="/" target="_top" style="text-decoration: none;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L4 9V21H20V9L12 3Z" stroke="#059669" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </a>
      <h1>Router <u>JSBach</u></h1>
    </div>

    <div class="button-container">
      <button data-action="wan" onclick="irSeccion('wan')">WAN</button>
      <button data-action="nat" onclick="irSeccion('nat')">NAT</button>
      <button data-action="vlans" onclick="irSeccion('vlans')">VLANS</button>
      <button data-action="tagging" onclick="irSeccion('tagging')">TAGGING</button>
      <button data-action="firewall" onclick="irSeccion('firewall')">FIREWALL</button>
      <button data-action="dmz" onclick="irSeccion('dmz')">DMZ</button>
      <button data-action="ebtables" onclick="irSeccion('ebtables')">EBTABLES</button>
      <button data-action="expect" onclick="irSeccion('expect')">EXPECT</button>
    </div>

    <div class="user-controls">
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <script src="/web/js/header.js"></script>
</body>

</html>

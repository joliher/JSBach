<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>JSBach – Security Gate</title>
    <link rel="stylesheet" href="/web/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <div class="login-box">
        <h2>JSBach Access</h2>

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" autocomplete="username" placeholder="user">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
        </div>

        <button onclick="login()">Acceder al Sistema</button>

        <div class="error" id="error"></div>
    </div>

    <script src="/web/js/login.js"></script>

</body>

</html>

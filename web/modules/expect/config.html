<!-- /web/modules/expect/config.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Configurar Orquestación</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .config-block {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .config-row {
            display: grid;
            grid-template-columns: 150px 1fr auto;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .param-label {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .param-menu {
            display: none;
            position: absolute;
            background: var(--secondary-color);
            border: 1px solid var(--accent-color);
            z-index: 100;
            border-radius: 4px;
            box-shadow: var(--shadow);
            min-width: 200px;
        }

        .param-menu button {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
        }

        .param-menu button:hover {
            background: var(--accent-color);
        }

        .menu-header {
            padding: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-config" class="section active">
                    <div class="container">
                        <h2>🛠️ Orquestación Remota</h2>
                        <div class="info-box">Configure los parámetros globales y de interfaces para la ejecución
                            remota.</div>

                        <form id="expect-form">
                            <div class="form-group">
                                <label>Seleccionar Switch Objetivo</label>
                                <select id="target-ip" required></select>
                            </div>

                            <div id="auth-feedback" class="info-box hidden"
                                style="background: rgba(16, 185, 129, 0.05); border-left-color: var(--success);">
                                <b>Usuario:</b> <span id="auth-feedback-user">-</span> |
                                <b>Perfil:</b> <span id="auth-feedback-profile">-</span>
                            </div>

                            <div class="config-header"
                                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <h3>⚙️ Configuración Global</h3>
                                <div class="add-param-container" style="position: relative;">
                                    <button type="button" class="btn btn-blue btn-small"
                                        onclick="showParamMenu(this, 'global')">➕ Añadir Parámetro</button>
                                    <div class="param-menu" id="global-menu"></div>
                                </div>
                            </div>
                            <div id="global-config-container" class="config-block" style="display: none;"></div>

                            <div class="config-header"
                                style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 15px 0;">
                                <h3>🔌 Configuración de Interfaces</h3>
                                <button type="button" class="btn btn-blue btn-small" onclick="addInterfaceBlock()">➕
                                    Añadir Bloque de Interfaz</button>
                            </div>
                            <div id="interface-config-container"></div>

                            <div class="form-group" style="margin-top: 30px; display: flex; gap: 20px;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" id="auth_required" checked style="width: auto;"> Requiere
                                    Autenticación
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" id="dry_run" style="width: auto;"> Modo Simulación (Dry Run)
                                </label>
                            </div>

                            <div id="auth-warning-box" class="warning-box hidden">
                                ⚠️ Asegúrese de que las credenciales en la sección <b>SWITCHES</b> sean correctas.
                            </div>

                            <button type="submit" class="btn btn-accent"
                                style="width: 100%; padding: 18px; margin-top: 20px;">🚀 Ejecutar Orquestación</button>
                        </form>

                        <div id="output" class="output hidden" style="margin-top: 30px;"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>

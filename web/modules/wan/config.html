<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Configuración WAN</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-config" class="section active">
                    <div class="container">
                        <h2>🏷️ Configuración de WAN</h2>
                        <div class="info-box" id="wan-info-container" style="display: none;">
                            <strong>🌐 Interfaz WAN Configurada:</strong>
                            <div id="wan-details"></div>
                            <div id="dhcp-notice" style="display: none; margin-top: 10px;">
                                <strong>⏱️ Obtención de IP por DHCP:</strong> El proceso puede tardar unos 30 segundos.
                            </div>
                        </div>

                        <div class="warning-box">
                            <strong>⚠️ ADVERTENCIA:</strong> Esta función es para la interfaz externa. No usar en
                            interfaces internas.
                        </div>

                        <form id="wan-form" class="grid-form"
                            style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                            <div class="form-group">
                                <label for="interface">Interfaz</label>
                                <input type="text" id="interface" placeholder="eth0, ens3, etc." required>
                            </div>

                            <div class="form-group">
                                <label for="mode">Modo</label>
                                <select id="mode">
                                    <option value="dhcp">DHCP (obtener IP automáticamente)</option>
                                    <option value="manual">Manual (IP estática)</option>
                                </select>
                            </div>

                            <div id="manual-fields" class="hidden"
                                style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label for="ip">IP</label>
                                    <input type="text" id="ip" placeholder="192.168.1.10">
                                </div>
                                <div class="form-group">
                                    <label for="mask">Máscara (CIDR)</label>
                                    <input type="number" id="mask" placeholder="24" min="0" max="32">
                                </div>
                                <div class="form-group">
                                    <label for="gateway">Gateway</label>
                                    <input type="text" id="gateway" placeholder="192.168.1.1">
                                </div>
                                <div class="form-group">
                                    <label for="dns">DNS (separados por coma)</label>
                                    <input type="text" id="dns" placeholder="8.8.8.8,1.1.1.1">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-accent" style="width: 100%; padding: 15px;">💾 Guardar
                                configuración</button>
                        </form>
                        <div id="config-result" style="margin-top: 15px; font-weight: 600;"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>

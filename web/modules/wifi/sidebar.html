<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/global.css">
</head>

<body class="sidebar">
    <h3>📶 Wi-Fi</h3>
    <div class="status-box inactivo" id="module-status">Estado: Cargando...</div>

    <button type="button" id="btnStart" onclick="irAccion('start')">🚀 WIFI START</button>
    <button type="button" id="btnStop" onclick="irAccion('stop')">🛑 WIFI STOP</button>
    <button type="button" id="btnRestart" onclick="irAccion('restart')">🔄 WIFI RESTART</button>
    <button type="button" id="btnStatus" onclick="irAccion('status')">📊 MONITOR</button>

    <div class="menu-divider"></div>
    <div
        style="display: flex; align-items: center; justify-content: space-between; padding: 0 5px; margin-bottom: 10px;">
        <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">📝
            Logs de Tráfico</span>
        <label class="switch">
            <input type="checkbox" id="toggle-log" onclick="toggleLogging(this, 'wifi')">
            <span class="slider round"></span>
        </label>
    </div>

    <button type="button" id="btnConfig" onclick="irSeccion('config')">⚙️ CONFIG. AP</button>
    <button type="button" id="btnSecurity" onclick="irSeccion('security_config')">🛡️ SEGURIDAD</button>
    <button type="button" id="btnPortal" onclick="irSeccion('portal_config')">🌐 PORTAL CAUTIVO</button>
    <button type="button" id="btnInfo" onclick="irSeccion('info')">ℹ️ INFORMACIÓN</button>

    <script src="js/sidebar.js"></script>
    <script src="/web/js/utils.js"></script>
</body>

</html>

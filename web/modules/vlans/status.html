<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Estado VLANs</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-status" class="section active">
                    <div class="container">
                        <h2>📊 Estado de VLANs</h2>
                        <div class="button-group" style="margin-bottom: 20px;">
                            <button onclick="refreshStatus()" id="btnRefresh" class="btn btn-accent">🔄
                                Actualizar</button>
                        </div>
                        <div class="table-responsive">
                            <div id="status-container" class="output">
                                <div class="loading">Inicie una acción o cargue el estado...</div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/status.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>

<!-- /web/modules/vlans/sidebar.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body class="sidebar">
    <h3>🔷 VLANs</h3>
    <div class="status-box desactivo" id="module-status">Estado: Cargando...</div>

    <button type="button" id="btnStart" onclick="irAccion('start')">🚀 VLANs START</button>
    <button type="button" id="btnStop" onclick="irAccion('stop')">🛑 VLANs STOP</button>
    <button type="button" id="btnRestart" onclick="irAccion('restart')">🔄 VLANs RESTART</button>
    <button type="button" id="btnStatus" onclick="irAccion('status')">📊 VLANs STATUS</button>

    <h4>Configuración</h4>
    <button type="button" id="btnConfig" onclick="irSeccion('config')">⚙️ VLANs CONFIG</button>

    <div class="menu-divider"></div>
    <div
        style="display: flex; align-items: center; justify-content: space-between; padding: 0 5px; margin-bottom: 10px;">
        <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">📝
            Logs de Tráfico</span>
        <label class="switch">
            <input type="checkbox" id="toggle-log" onclick="toggleLogging(this, 'vlans')">
            <span class="slider round"></span>
        </label>
    </div>

    <button type="button" id="btnInfo" onclick="irSeccion('info')">ℹ️ VER INFO</button>

    <script src="js/sidebar.js"></script>
    <script src="/web/js/utils.js"></script>
</body>

</html>

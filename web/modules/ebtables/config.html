<!-- /web/modules/ebtables/config.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Configuración Aislamiento (PVLAN)</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .vlan-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .vlan-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .vlan-info h4 {
            margin: 0;
            color: var(--text-primary);
        }

        .vlan-info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-config" class="section active">
                    <div class="container">
                        <h2>⚙️ Configuración PVLAN (Private VLAN)</h2>
                        <div class="info-box">
                            <strong>ℹ️ Información:</strong> El aislamiento PVLAN opera en Capa 2. Las VLANs marcadas
                            como **Aisladas** solo podrán comunicarse con la WAN, bloqueando cualquier tráfico directo
                            hacia otras VLANs o hosts internos.
                        </div>

                        <div id="message-container" style="margin-bottom: 20px; font-weight: 600;"></div>

                        <div id="vlan-container">
                            <div class="loading">Cargando configuración de VLANs y aislamiento...</div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>

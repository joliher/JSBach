<!-- /web/modules/dmz/config.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Añadir Destino DMZ</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-config" class="section active">
                    <div class="container">
                        <h2>⚙️ Configurar Nuevo Destino DMZ</h2>
                        <div class="warning-box" id="firewall-warning" style="display:none;">
                            <strong>⚠️ AVISO:</strong> El Firewall e Iniciar el el módulo DMZ son necesarios para que
                            estas reglas tengan efecto real en el tráfico.
                        </div>

                        <div id="config-result" style="margin-bottom: 15px; font-weight: 600;"></div>

                        <form id="dmz-form" class="grid-form">
                            <div class="form-group">
                                <label>IP de destino interna</label>
                                <input type="text" id="dest-ip" placeholder="Ej: 192.168.2.10" required>
                                <small style="color: var(--text-secondary); display: block; margin-top: 5px;">💡 IP del
                                    servidor o dispositivo en la DMZ.</small>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label>Puerto Externo</label>
                                    <input type="number" id="dest-port" placeholder="Ej: 80" min="1" max="65535"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label>Protocolo</label>
                                    <select id="dest-protocol" required>
                                        <option value="tcp">TCP</option>
                                        <option value="udp">UDP</option>
                                    </select>
                                </div>
                            </div>
                            <div style="margin-top: 10px;">
                                <button type="submit" class="btn btn-accent" style="width: 100%; padding: 15px;">➕
                                    Añadir Destino a DMZ</button>
                            </div>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>

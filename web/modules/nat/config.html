<!-- /web/modules/nat/config.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>JSBach - Configuración NAT</title>
    <link rel="stylesheet" href="/web/css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body class="grid-bg">
    <div class="container-main">
        <iframe src="/web/header.html" class="top-frame" name="header"></iframe>

        <div class="content-wrapper">
            <iframe src="sidebar.html" class="sidebar-frame" style="border:none; height:100%; width:320px;"></iframe>

            <main class="main-area">
                <section id="section-config" class="section active">
                    <div class="container">
                        <h2>⚙️ Configuración NAT</h2>
                        <div class="info-box">
                            <strong>ℹ️ Información:</strong> Configure la interfaz para NAT (Masquerading). Debe ser la
                            interfaz WAN para permitir la navegación de la red interna hacia el exterior.
                        </div>

                        <div id="wan-info-container" class="info-box"
                            style="display: none; background: rgba(59, 130, 246, 0.05);">
                            <strong>🌐 Interfaz WAN Configurada:</strong>
                            <div id="wan-details"></div>
                        </div>

                        <div id="nat-info-container" class="info-box"
                            style="display: none; background: rgba(16, 185, 129, 0.05); border-left-color: var(--success); color: var(--success);">
                            <strong>🔄 Interfaz NAT Actual:</strong>
                            <div id="nat-details"></div>
                        </div>

                        <form id="nat-form" class="grid-form">
                            <div class="form-group">
                                <label for="interface">Interfaz</label>
                                <input type="text" id="interface" placeholder="eth0, ens3, etc." required>
                            </div>
                            <button type="submit" class="btn btn-accent" style="width: 100%; padding: 15px;">💾 Guardar
                                Configuración</button>
                        </form>
                        <div id="config-result" style="margin-top: 15px; font-weight: 600;"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
<script src="/web/js/utils.js"></script>
</body>

</html>
